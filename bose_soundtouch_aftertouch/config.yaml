name: Bose SoundTouch AfterTouch
version: "0.72.0-11"
slug: bose_soundtouch_aftertouch
description: >-
  Run the Bose SoundTouch AfterTouch service on Home Assistant to keep
  SoundTouch speakers working after the Bose cloud shutdown.
url: https://github.com/GameTec-live/soundtouch-homeassistant
init: false
startup: services
backup: cold
boot: auto
host_network: true
ingress: true
ingress_port: 8000
panel_icon: mdi:speaker-wireless
panel_title: Bose SoundTouch
webui: http://[HOST]:[PORT:8000]/
arch:
  - aarch64
  - amd64
  - armv7
map:
  - type: data
    path: /data
options:
  target_hostname: null
  mgmt_username: admin
  mgmt_password: change_me!
  preferred_devices: ""
  base_url: ""
  discovery_interval: 5m
  discovery_timeout: 5s
  upnp_enabled: true
  record_interactions: true
  redact_proxy_logs: true
  log_proxy_body: false
schema:
  target_hostname: str
  mgmt_username: str
  mgmt_password: str
  preferred_devices: str?
  base_url: str?
  discovery_interval: match(^[0-9]+(ms|s|m|h)$)
  discovery_timeout: match(^[0-9]+(ms|s|m|h)$)
  upnp_enabled: bool
  record_interactions: bool
  redact_proxy_logs: bool
  log_proxy_body: bool
